<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <defs>
    <linearGradient id="sunbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="60%" stop-color="#3d2860"/>
      <stop offset="100%" stop-color="#5a3820"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo noche/atardecer -->
  <rect width="600" height="320" fill="url(#sunbg)"/>
  <rect width="600" height="320" fill="url(#glow)"/>

  <!-- Estrellas -->
  <circle cx="80" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="15" r="1" fill="white" opacity="0.7"/>
  <circle cx="480" cy="25" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="540" cy="45" r="1" fill="white" opacity="0.6"/>
  <circle cx="380" cy="10" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="60" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="520" cy="60" r="1.5" fill="white" opacity="0.7"/>

  <!-- Suelo -->
  <path d="M0 240 Q150 225 300 235 Q450 245 600 230 L600 320 L0 320 Z" fill="#4a3018"/>

  <!-- Zarza / matorrales (detrás del carnero) -->
  <!-- Ramas -->
  <line x1="310" y1="240" x2="280" y2="175" stroke="#5a3010" stroke-width="4"/>
  <line x1="310" y1="220" x2="340" y2="165" stroke="#5a3010" stroke-width="3"/>
  <line x1="320" y1="235" x2="355" y2="180" stroke="#5a3010" stroke-width="3"/>
  <line x1="300" y1="230" x2="260" y2="185" stroke="#5a3010" stroke-width="3"/>
  <!-- Hojas de zarza -->
  <ellipse cx="275" cy="168" rx="18" ry="10" fill="#2d5a1e" transform="rotate(-20,275,168)"/>
  <ellipse cx="290" cy="155" rx="15" ry="9" fill="#3a7028" transform="rotate(15,290,155)"/>
  <ellipse cx="345" cy="160" rx="18" ry="10" fill="#2d5a1e" transform="rotate(25,345,160)"/>
  <ellipse cx="358" cy="172" rx="14" ry="8" fill="#3a7028" transform="rotate(-10,358,172)"/>
  <ellipse cx="262" cy="180" rx="16" ry="9" fill="#2d5a1e" transform="rotate(30,262,180)"/>
  <!-- Espinas (líneas pequeñas) -->
  <line x1="285" y1="190" x2="278" y2="183" stroke="#8b4513" stroke-width="1.5"/>
  <line x1="325" y1="195" x2="332" y2="188" stroke="#8b4513" stroke-width="1.5"/>
  <line x1="305" y1="205" x2="298" y2="197" stroke="#8b4513" stroke-width="1.5"/>

  <!-- CARNERO - cuerpo -->
  <ellipse cx="300" cy="215" rx="70" ry="45" fill="#d4a055"/>
  <!-- Lana textura -->
  <ellipse cx="270" cy="205" rx="20" ry="18" fill="#e8c070" opacity="0.6"/>
  <ellipse cx="300" cy="198" rx="22" ry="16" fill="#e8c070" opacity="0.6"/>
  <ellipse cx="330" cy="207" rx="18" ry="16" fill="#e8c070" opacity="0.6"/>
  <ellipse cx="285" cy="225" rx="20" ry="14" fill="#e8c070" opacity="0.5"/>
  <ellipse cx="315" cy="222" rx="18" ry="13" fill="#e8c070" opacity="0.5"/>

  <!-- Cabeza del carnero -->
  <ellipse cx="240" cy="200" rx="35" ry="28" fill="#c09040"/>
  <!-- Cara -->
  <ellipse cx="227" cy="205" rx="18" ry="14" fill="#b07830"/>
  <!-- Ojo -->
  <circle cx="222" cy="200" r="5" fill="#1a1a1a"/>
  <circle cx="220" cy="198" r="2" fill="white" opacity="0.7"/>
  <!-- Nariz/hocico -->
  <ellipse cx="212" cy="210" rx="8" ry="5" fill="#8a5020"/>
  <circle cx="210" cy="209" r="2" fill="#5a3010"/>
  <circle cx="215" cy="209" r="2" fill="#5a3010"/>

  <!-- CUERNOS del carnero (curvados) -->
  <path d="M240 178 Q225 150 210 160 Q195 168 205 185" stroke="#7a5020" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M255 175 Q265 148 280 155 Q295 162 282 180" stroke="#7a5020" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Brillo cuernos -->
  <path d="M237 176 Q222 152 210 163" stroke="#c09050" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Patas del carnero -->
  <rect x="255" y="250" width="14" height="30" rx="6" fill="#c09040"/>
  <rect x="278" y="252" width="14" height="28" rx="6" fill="#c09040"/>
  <rect x="308" y="252" width="14" height="28" rx="6" fill="#c09040"/>
  <rect x="330" y="250" width="14" height="30" rx="6" fill="#c09040"/>
  <!-- Pezuñas -->
  <ellipse cx="262" cy="281" rx="8" ry="4" fill="#5a3010"/>
  <ellipse cx="285" cy="281" rx="8" ry="4" fill="#5a3010"/>
  <ellipse cx="315" cy="281" rx="8" ry="4" fill="#5a3010"/>
  <ellipse cx="337" cy="281" rx="8" ry="4" fill="#5a3010"/>

  <!-- Cola -->
  <ellipse cx="368" cy="218" rx="12" ry="16" fill="#e8c070"/>

  <!-- Ropa de Abraham (silueta a la derecha) -->
  <ellipse cx="520" cy="168" rx="18" ry="18" fill="#c8a870"/>
  <path d="M502 185 Q510 240 505 280 L535 280 Q530 240 538 185 Z" fill="#8a6040"/>
  <!-- Brazo levantado (con cuchillo) -->
  <line x1="520" y1="200" x2="540" y2="160" stroke="#8a6040" stroke-width="10" stroke-linecap="round"/>
  <!-- Cuchillo -->
  <line x1="540" y1="160" x2="555" y2="140" stroke="#c0c0c0" stroke-width="4"/>
  <polygon points="555,140 560,132 562,145" fill="#c0c0c0"/>

  <!-- Ángel (silueta luminosa) -->
  <ellipse cx="460" cy="120" rx="12" ry="12" fill="#ffe066" opacity="0.9"/>
  <path d="M455 130 L445 165 L475 165 L465 130 Z" fill="#ffe066" opacity="0.85"/>
  <!-- Alas -->
  <path d="M448 135 Q425 120 430 140" stroke="#fff8cc" stroke-width="3" fill="#fff8cc" opacity="0.8"/>
  <path d="M472 135 Q495 120 490 140" stroke="#fff8cc" stroke-width="3" fill="#fff8cc" opacity="0.8"/>
  <!-- Brillo ángel -->
  <circle cx="460" cy="115" r="20" fill="#ffe066" opacity="0.2"/>

  <!-- Título / referencia -->
  <rect x="10" y="278" width="250" height="35" rx="8" fill="#1a1a3e" opacity="0.9"/>
  <text x="135" y="293" text-anchor="middle" fill="#FFD700" font-size="12" font-family="serif" font-weight="bold">🐏 El Sacrificio de Abraham</text>
  <text x="135" y="308" text-anchor="middle" fill="#fff8e0" font-size="10" font-family="serif">Génesis 22:13 — Un carnero en su lugar</text>
</svg>
